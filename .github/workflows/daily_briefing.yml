name: Daily Naver Stock Briefing

on:
  schedule:
    # 08:00 KST is 23:00 UTC (previous day). Runs Monday to Friday KST (Sun-Thu UTC)
    - cron: '0 23 * * 0-4'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  run-scraper-and-analyzer:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run main pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python main.py

      - name: Commit and push generated briefing
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          if [ -d "output" ]; then
            git add -f output/
            # Only commit if there are changes
            if ! git diff-index --quiet HEAD; then
              git commit -m "docs: auto-generate daily briefing"
              git push
            else
              echo "No changes to commit"
            fi
          else
            echo "No output directory generated, skipping commit."
          fi
